name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build needs the Supabase URL/key at compile time because
          # generateStaticParams hits the RPC. Use repo secrets for real values
          # or harmless placeholders if the build is expected to skip data
          # fetching in CI.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret' }}
          NEXTAUTH_URL: http://localhost:3000
          GITHUB_ID: ${{ secrets.GH_OAUTH_ID || 'ci-placeholder' }}
          GITHUB_SECRET: ${{ secrets.GH_OAUTH_SECRET || 'ci-placeholder' }}
